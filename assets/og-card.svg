<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="hub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd093"/>
      <stop offset="55%" stop-color="#d62f3c"/>
      <stop offset="100%" stop-color="#2a0508"/>
    </radialGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a090c"/>
      <stop offset="100%" stop-color="#1a0e0c"/>
    </linearGradient>
    <radialGradient id="ambient" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#d62f3c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a090c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambient2" cx="80%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#d4a256" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a090c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#ambient)"/>
  <rect width="1200" height="630" fill="url(#ambient2)"/>

  <!-- Chakra logo -->
  <g transform="translate(900 315)">
    <circle cx="0" cy="0" r="180" fill="none" stroke="#d4a256" stroke-width="4" opacity="0.95"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#d62f3c" stroke-width="2" opacity="0.7"/>
    <g stroke="#d4a256" stroke-width="3" stroke-linecap="round" opacity="0.9">
      <line x1="0" y1="-168" x2="0" y2="-24"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(22.5)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(45)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(67.5)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(90)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(112.5)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(135)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(157.5)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(180)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(202.5)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(225)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(247.5)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(270)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(292.5)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(315)"/>
      <line x1="0" y1="-168" x2="0" y2="-24" transform="rotate(337.5)"/>
    </g>
    <circle cx="0" cy="0" r="40" fill="url(#hub)"/>
    <circle cx="0" cy="0" r="18" fill="#0a0608"/>
    <circle cx="0" cy="0" r="5" fill="#d4a256"/>
  </g>

  <!-- Copper eyebrow rule -->
  <line x1="80" y1="225" x2="120" y2="225" stroke="#d4a256" stroke-width="2"/>
  <!-- Eyebrow -->
  <text x="140" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#e6dfd4" letter-spacing="2">RETENCY  ·  BENGALURU</text>

  <!-- Title -->
  <text x="80" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="500" fill="#f2ede4" letter-spacing="-2">AI creative that</text>
  <text x="80" y="408" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="500" fill="#f2ede4" letter-spacing="-2">turns <tspan font-style="italic" fill="#d4a256">attention</tspan> into</text>
  <text x="80" y="496" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="500" font-style="italic" fill="#d4a256" letter-spacing="-2">revenue.</text>

  <!-- Footer -->
  <text x="80" y="568" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#8a8478" letter-spacing="1">AI Creative &amp; Animation Studio · Makers of Swarajya, India's first AI anime</text>
</svg>
